services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greenpro_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: greenpro_redis
    restart: unless-stopped
    ports:
      # Host 6379 is often taken by a local Redis install; use 6380 on Windows host.
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  mongo:
    image: mongo:7
    container_name: greenpro_mongo
    restart: unless-stopped
    profiles:
      - localdb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" localhost:27017/test | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  uploads_data:
  redis_data:
  mongo_data: